server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: xingyu-lab
  datasource:
    url: jdbc:mysql://localhost:3306/xingyu_lab?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# 本地存储配置
storage:
  local:
    base-path: ./uploads
    base-url: http://localhost:8080/uploads

# AI 配置 (待填入)
ai:
  api-key: your-api-key
  base-url: https://api.openai.com/v1
  default-model: gpt-3.5-turbo
  max-tokens: 2048
  temperature: 0.7

logging:
  level:
    com.yangxingyu.xingyulab: debug
